<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>行政區宅配大挑戰｜起始頁</title>
  <link rel="stylesheet" href="style.css?v=3" />
</head>

<body class="start-page">
  <!-- 滿版外容器 -->
  <div id="game-container">
    <!-- 1440x900 核心遊戲板 -->
    <div id="game-board" class="start-wrap" role="main" aria-label="起始頁">
      
      <!-- 滿版大原畫底圖 -->
      <img class="bg-image" src="picture/start.png" alt="遊戲背景插圖" />

      <!-- 浮空旁白字（打字機效果） -->
      <section class="hud-panel">
        <p class="game-desc" id="startDesc"></p>
      </section>

      <!-- 點擊任意處開始提示字 -->
      <div id="startPrompt" class="start-prompt">
        點擊任意處開始
      </div>

    </div>
  </div>

  <script>
    // ====== 遊戲畫面動態縮放邏輯 ======
    function resizeGame() {
      const board = document.getElementById("game-board");
      const targetW = 1440;
      const targetH = 900;
      const winW = window.innerWidth;
      const winH = window.innerHeight;
      
      const scale = Math.min(winW / targetW, winH / targetH);
      
      board.style.transform = `translate(-50%, -50%) scale(${scale})`;
      board.style.left = "50%";
      board.style.top = "50%";
      board.style.position = "absolute";
    }

    window.addEventListener("resize", resizeGame);
    window.addEventListener("DOMContentLoaded", resizeGame);

    const fullText = "你是穿梭在全臺的宅配員，請根據送貨單上的資訊，<br>選出對應的地址，把包裹送到正確的門市！";
    let typeFinished = false;

    // 打字機特效 (支援 HTML 標籤如 <br> 的字字輸出，防止打字時露出原始碼)
    function runTypewriter(element, text, speed = 40) {
      let i = 0;
      element.innerHTML = "";
      element.classList.add("typewriter-cursor"); // 開始打字，加入游標
      function type() {
        if (i < text.length) {
          // 若遇到 HTML 標籤起點，一次性加載完畢，防止打字機露出原始碼
          if (text.charAt(i) === '<') {
            let tagClose = text.indexOf('>', i);
            if (tagClose !== -1) {
              element.innerHTML += text.slice(i, tagClose + 1);
              i = tagClose + 1;
            } else {
              element.innerHTML += text.charAt(i);
              i++;
            }
          } else {
            element.innerHTML += text.charAt(i);
            i++;
          }
          setTimeout(type, speed);
        } else {
          typeFinished = true;
          element.classList.remove("typewriter-cursor"); // 打字完成，移除游標
          const prompt = document.getElementById("startPrompt");
          prompt.style.opacity = "1";
        }
      }
      type();
    }

    // 遊戲開始跳轉邏輯 (點擊全螢幕/任意處)
    let isTransitioning = false;
    const startGame = () => {
      if (isTransitioning) return;
      isTransitioning = true;
      
      const board = document.getElementById("game-board");
      board.style.transition = "opacity 0.4s ease";
      board.style.opacity = "0";
      
      setTimeout(() => {
        window.location.href = "game.html";
      }, 400);
    };

    // 監聽整個遊戲板的點擊
    document.getElementById("game-board").addEventListener("click", startGame);
    
    // 鍵盤支援
    window.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        startGame();
      }
    });

    // 頁面載入完成後啟動打字機與指標手勢
    document.addEventListener("DOMContentLoaded", () => {
      // 設置滑鼠游標為 pointer 代表可點擊
      document.getElementById("game-board").style.cursor = "pointer";
      
      const descEl = document.getElementById("startDesc");
      const prompt = document.getElementById("startPrompt");
      prompt.style.opacity = "0"; // 初始打字時先隱藏
      
      setTimeout(() => {
        runTypewriter(descEl, fullText, 80);
      }, 400);
    });
  </script>
</body>
</html>
