<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>行政區宅配大挑戰｜結局頁</title>
  <link rel="stylesheet" href="style.css?v=3" />
</head>

<body class="start-page end-page">
  <!-- 滿版外容器 -->
  <div id="game-container">
    <!-- 1440x900 核心遊戲板 -->
    <div id="game-board" class="start-wrap" role="main" aria-label="結局頁">
      
      <!-- 滿版結局大底圖 -->
      <img class="bg-image" id="endBg" src="picture/end1.png" alt="結局插圖"
           onerror="this.onerror=null; this.src='picture/start.png';" />

      <!-- 浮空旁白字（打字機效果） -->
      <section class="hud-panel">
        <p class="game-desc" id="endingText"></p>
      </section>

      <!-- 點擊任意處重新挑戰提示 -->
      <div id="startPrompt" class="start-prompt">
        點擊任意處重新挑戰
      </div>

    </div>
  </div>

  <script>
    // ====== 遊戲畫面動態縮放邏輯 ======
    function resizeGame() {
      const board = document.getElementById("game-board");
      const targetW = 1440;
      const targetH = 900;
      const winW = window.innerWidth;
      const winH = window.innerHeight;
      
      const scale = Math.min(winW / targetW, winH / targetH);
      
      board.style.transform = `translate(-50%, -50%) scale(${scale})`;
      board.style.left = "50%";
      board.style.top = "50%";
      board.style.position = "absolute";
    }

    window.addEventListener("resize", resizeGame);
    window.addEventListener("DOMContentLoaded", resizeGame);

    // 讀取結局代碼 e（end1 ~ end5）
    function getQueryParam(key){
      const url = new URL(window.location.href);
      return url.searchParams.get(key);
    }
    const ending = getQueryParam("e") || "end5";

    // 設定滿版背景圖
    const bgImage = document.getElementById("endBg");
    bgImage.src = `picture/${ending}.png`;
    bgImage.alt = `結局背景 - ${ending}`;
    bgImage.onerror = function(){
      this.onerror = null;
      this.src = "picture/start.png"; // 後備圖片
    };

    // 結局評語文字
    const texts = {
      end1: "每趟包裹都送得又快又準，只要有門牌的地方，<br>就能看到你專業的身影——你已成為業界的傳說！",
      end2: "大多數包裹都能順利送達，距離完美只差一步，<br>你的表現相當亮眼，獲得老闆和客戶們一致肯定！",
      end3: "貨雖然送到了，但速度總是慢半拍，<br>這樣的表現只能算勉強過關，或許再熟悉一陣子就會更上手！",
      end4: "送貨的狀況不是很理想，接二連三的錯誤，<br>讓公司評價一路下滑，這樣下去可能要領不到薪水了！",
      end5: "你的包裹總是送錯地方，客戶的投訴層出不窮。<br>表現完全不合格，公司二話不說就決定把你開除！"
    };

    let typeFinished = false;
    // 打字機效果 (支援 HTML 標籤如 <br> 的字字輸出，防止打字時露出原始碼)
    function runTypewriter(element, text, speed = 40) {
      let i = 0;
      element.innerHTML = "";
      element.classList.add("typewriter-cursor"); // 開始打字，加入游標
      function type() {
        if (i < text.length) {
          // 若遇到 HTML 標籤起點，一次性加載完畢，防止打字機露出原始碼
          if (text.charAt(i) === '<') {
            let tagClose = text.indexOf('>', i);
            if (tagClose !== -1) {
              element.innerHTML += text.slice(i, tagClose + 1);
              i = tagClose + 1;
            } else {
              element.innerHTML += text.charAt(i);
              i++;
            }
          } else {
            element.innerHTML += text.charAt(i);
            i++;
          }
          setTimeout(type, speed);
        } else {
          typeFinished = true;
          element.classList.remove("typewriter-cursor"); // 打字完成，移除游標
          document.getElementById("startPrompt").style.opacity = "1";
        }
      }
      type();
    }

    // 重新挑戰 -> 回起始頁
    let isTransitioning = false;
    const restartGame = () => {
      if (isTransitioning) return;
      isTransitioning = true;
      
      const board = document.getElementById("game-board");
      board.style.transition = "opacity 0.4s ease";
      board.style.opacity = "0";
      
      setTimeout(() => {
        window.location.href = "index.html";
      }, 400);
    };

    document.getElementById("game-board").addEventListener("click", restartGame);

    // 鍵盤支援
    window.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        restartGame();
      }
    });

    // 頁面載入完成後啟動打字機與指標手勢
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("game-board").style.cursor = "pointer";
      
      const descEl = document.getElementById("endingText");
      const prompt = document.getElementById("startPrompt");
      prompt.style.opacity = "0";
      
      const textToType = texts[ending] || texts.end5;
      
      setTimeout(() => {
        runTypewriter(descEl, textToType, 80);
      }, 400);
    });
  </script>
</body>
</html>
